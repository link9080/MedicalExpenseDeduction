<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>医療費控除DX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/app.js"></script>
    <link href="/css/index.css" rel="stylesheet" />
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span>🏥</span> 医療費控除スキャナー
        </h1>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-slate-200">
            <div class="flex gap-2">
                <input type="password" id="appPass" placeholder="アプリパスワード" 
                    class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500">
                <button onclick="savePass()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-bold">保存</button>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-tab-reg" onclick="showPage('reg')" class="flex-1 py-3 rounded-2xl font-bold transition-all bg-blue-600 text-white shadow-lg">➕ 撮影・登録</button>
            <button id="btn-tab-view" onclick="showPage('view'); loadList();" class="flex-1 py-3 rounded-2xl font-bold transition-all bg-white text-slate-600 border border-slate-200">📋 履歴閲覧</button>
        </div>

        <div id="page-reg" class="space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 text-center">
                <label class="block cursor-pointer">
                    <div class="border-4 border-dashed border-slate-200 rounded-2xl py-10 hover:border-blue-400 transition-colors">
                        <span class="text-4xl mb-2 block">📸</span>
                        <span class="text-slate-500 font-medium">レシートを撮影する</span>
                        <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden">
                    </div>
                </label>
                <p id="status" class="text-xs text-slate-400 mt-4 h-4"></p>
            </div>

            <div id="editCard" class="bg-white rounded-3xl shadow-xl border border-blue-100 overflow-hidden hidden animate-in fade-in duration-500">
                <div class="bg-blue-50 p-4 border-b border-blue-100">
                    <h2 class="text-blue-800 font-bold text-sm">AI解析結果（修正可能です）</h2>
                </div>
                <table class="w-full">
                    <tr class="border-b border-slate-100">
                        <th class="w-1/3 p-4 text-left text-xs text-slate-500 bg-slate-50/50">取引年月日</th>
                        <td id="td-date" class="edit-area p-4 font-mono font-bold text-blue-700" contenteditable="true"></td>
                    </tr>
                    <tr class="border-b border-slate-100">
                        <th class="p-4 text-left text-xs text-slate-500 bg-slate-50/50">金額</th>
                        <td id="td-price" class="edit-area p-4 text-lg font-black text-slate-900" contenteditable="true" inputmode="numeric"></td>
                    </tr>
                    <tr class="border-b border-slate-100">
                        <th class="p-4 text-left text-xs text-slate-500 bg-slate-50/50">取引先</th>
                        <td id="td-store" class="edit-area p-4 font-bold text-slate-700" contenteditable="true"></td>
                    </tr>
                    <tr>
                        <th class="p-4 text-left text-xs text-slate-500 bg-slate-50/50">商品名/内容</th>
                        <td id="td-item" class="edit-area p-4 text-slate-600" contenteditable="true"></td>
                    </tr>
                </table>
                <button id="regBtn" class="w-full bg-green-500 hover:bg-green-600 text-white py-5 font-black text-lg transition-colors flex items-center justify-center gap-2">
                    ✅ この内容で確定・保存
                </button>
            </div>
        </div>

        <div id="page-view" class="hidden space-y-4">
            <div id="listBody" class="space-y-3">
                </div>
        </div>
    </main>
</html>
